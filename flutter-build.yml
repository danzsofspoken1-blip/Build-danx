name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag'
        required: true
        type: string
      build_type:
        description: 'Build Type'
        required: true
        type: choice
        options:
          - debug
          - release
      release_url:
        description: 'Release URL'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          
      - name: Download project
        run: |
          curl -L "${{ github.event.inputs.release_url }}/download/project.zip" -o project.zip
          unzip project.zip -d project
          
      - name: Build APK
        run: |
          cd project
          flutter pub get
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: flutter-apk
          path: project/build/app/outputs/flutter-apk/*.apk
