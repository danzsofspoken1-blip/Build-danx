name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag'
        required: true
        type: string
      build_type:
        description: 'Build Type'
        required: true
        type: choice
        options:
          - debug
          - release
      release_url:
        description: 'Release URL'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          
      - name: Download project
        run: |
          echo "📥 Downloading from ${{ github.event.inputs.release_url }}"
          curl -L "${{ github.event.inputs.release_url }}/download/project.zip" -o project.zip
          unzip -q project.zip -d project
          ls -la project/
          
      - name: Validate project
        run: |
          cd project
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi
          echo "✅ pubspec.yaml found"
          
      - name: Flutter pub get
        run: |
          cd project
          flutter pub get
          
      - name: Build APK
        run: |
          cd project
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            echo "🔨 Building DEBUG APK..."
            flutter build apk --debug
          else
            echo "🔨 Building RELEASE APK..."
            flutter build apk --release
          fi
          
      - name: Check APK
        run: |
          cd project
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          else
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          fi
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi
          echo "✅ APK found!"
          ls -la "$APK_PATH"
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: flutter-apk
          path: project/build/app/outputs/flutter-apk/*.apk
