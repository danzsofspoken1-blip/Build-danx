name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release Tag'
        required: true
        type: string
      build_type:
        description: 'Build Type'
        required: true
        type: choice
        options:
          - debug
          - release
      release_url:
        description: 'Release URL'
        required: true
        type: string

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # ─── STEP 1: CHECKOUT ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # ─── STEP 2: SETUP FLUTTER ─────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable'
          cache: true
          
      # ─── STEP 3: SETUP JAVA ─────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      # ─── STEP 4: SETUP ANDROID SDK ──────────────────────
      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=${{ runner.tool_cache }}/android-sdk" >> $GITHUB_ENV
          mkdir -p ${{ runner.tool_cache }}/android-sdk
          echo "y" | sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
          
      # ─── STEP 5: DOWNLOAD PROJECT ───────────────────────
      - name: Download project
        run: |
          echo "📥 Downloading project from ${{ github.event.inputs.release_url }}"
          curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               "${{ github.event.inputs.release_url }}/download/project.zip" \
               -o project.zip
          unzip -q project.zip -d project
          echo "📂 Project extracted:"
          ls -la project/
          
      # ─── STEP 6: VALIDASI PROJECT ──────────────────────
      - name: Validate Flutter project
        run: |
          cd project
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi
          echo "✅ pubspec.yaml found"
          
          if [ ! -d "lib" ]; then
            echo "❌ lib folder not found!"
            exit 1
          fi
          echo "✅ lib folder found"
          
          if [ ! -d "android" ]; then
            echo "❌ android folder not found!"
            exit 1
          fi
          echo "✅ android folder found"
          
      # ─── STEP 7: FLUTTER CLEAN ──────────────────────────
      - name: Flutter clean
        run: |
          cd project
          flutter clean
          rm -rf build/
          
      # ─── STEP 8: FLUTTER PUB GET ────────────────────────
      - name: Flutter pub get
        run: |
          cd project
          flutter pub get
          
      # ─── STEP 9: BUILD APK ──────────────────────────────
      - name: Build APK
        id: build_apk
        run: |
          cd project
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            echo "🔨 Building DEBUG APK..."
            flutter build apk --debug --verbose
            APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          else
            echo "🔨 Building RELEASE APK..."
            flutter build apk --release --verbose
            APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          
      # ─── STEP 10: CHECK APK ─────────────────────────────
      - name: Check APK exists
        run: |
          cd project
          if [ ! -f "${{ env.APK_PATH }}" ]; then
            echo "❌ APK not found!"
            echo "📂 Directory contents:"
            ls -la build/app/outputs/flutter-apk/ || echo "No APK directory"
            exit 1
          fi
          APK_SIZE=$(du -h "${{ env.APK_PATH }}" | cut -f1)
          echo "✅ APK found! Size: $APK_SIZE"
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
          
      # ─── STEP 11: UPLOAD APK ────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: project/${{ env.APK_PATH }}
          retention-days: 7
          
      # ─── STEP 12: UPLOAD BUILD LOGS ─────────────────────
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: project/build/
          retention-days: 3
          
      # ─── STEP 13: NOTIFY SUCCESS ────────────────────────
      - name: Build Success
        if: success()
        run: |
          echo "✅ Build successful!"
          echo "📦 APK Size: ${{ env.APK_SIZE }}"
          echo "🔧 Mode: ${{ github.event.inputs.build_type }}"
          
      # ─── STEP 14: NOTIFY FAILED ─────────────────────────
      - name: Build Failed
        if: failure()
        run: |
          echo "❌ Build failed!"
          echo "📂 Check build logs for details"
          exit 1
